<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SheetSync Report{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            background: #f5f7fa;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 30px 40px;
        }
        .header h1 { font-size: 26px; font-weight: 300; letter-spacing: 1px; }
        .header .subtitle {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 6px;
        }
        .content { padding: 30px 40px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8f9ff;
            border: 1px solid #e8ecf4;
            border-radius: 8px;
            padding: 18px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .stat-card .label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .growth-positive { color: #27ae60 !important; }
        .growth-negative { color: #e74c3c !important; }

        h2 {
            font-size: 18px;
            color: #16213e;
            margin: 24px 0 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #e8ecf4;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
            font-size: 14px;
        }
        table thead th {
            background: #16213e;
            color: white;
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        table thead th:not(:first-child) { text-align: right; }
        table tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid #f0f0f0;
        }
        table tbody td:not(:first-child) { text-align: right; }
        table tbody tr:nth-child(even) { background: #fafbfc; }
        table tbody tr:hover { background: #f0f4ff; }

        .footer {
            background: #fafbfc;
            border-top: 1px solid #eee;
            padding: 16px 40px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{% block header_title %}SheetSync Report{% endblock %}</h1>
            <div class="subtitle">{% block header_subtitle %}Automated report{% endblock %}</div>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            Generated by {{ generator | default('SheetSync') }} on {{ generated_at | default('N/A') }}
        </div>
    </div>
</body>
</html>
